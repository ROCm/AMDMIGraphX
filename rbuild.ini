[main]
cxx = ${rocm_path}/llvm/bin/clang++
cc = ${rocm_path}/llvm/bin/clang
deps =
    ROCm/rocm-recipes
    -f requirements.txt

[windows]
cxx = ${rocm_path}\bin\clang++.exe
cc = ${rocm_path}\bin\clang.exe
ignore =
    ROCm/composable_kernel
deps =
    ROCm/rocm-cmake@uai-develop
    ROCm/rocm-recipes
    -f requirements.txt

[windows.ml]
cxx = ${rocm_path}\bin\clang++.exe
cc = ${rocm_path}\bin\clang.exe
ignore =
    ROCm/composable_kernel
define =
    GPU_TARGETS=gfx1100;gfx1101;gfx1102;gfx1103;gfx1150;gfx1151;gfx1152;gfx1200;gfx1201
    MIGRAPHX_USE_HIPRTC=On
    MIGRAPHX_USE_BINSKIM_COMPLIANT_COMPILE_FLAGS=On
    MIGRAPHX_USE_ROCBLAS=Off
    MIGRAPHX_USE_HIPBLASLT=Off
    MIGRAPHX_USE_MIOPEN=Off
    MIGRAPHX_ENABLE_TENSORFLOW=Off
    MIGRAPHX_ENABLE_PYTHON=Off
    BUILD_TESTING=Off
deps =
    ROCm/rocm-cmake@uai-develop
    ROCm/rocm-recipes
    -f requirements.txt

[gh]
ignore =
    danmar/cppcheck
    ROCm/rocMLIR
deps =
    -f dev-requirements.txt
    oneapi-src/oneDNN@v1.7
define =
    CMAKE_C_COMPILER_LAUNCHER=${deps_dir}/bin/ccache
    CMAKE_CXX_COMPILER_LAUNCHER=${deps_dir}/bin/ccache
    MIGRAPHX_ENABLE_CPU=On
    BUILD_DEV=On

[develop]
cxx = ${rocm_path}/llvm/bin/clang++
cc = ${rocm_path}/llvm/bin/clang
deps =
    -f dev-requirements.txt
    oneapi-src/oneDNN@v1.7
define =
    CMAKE_C_COMPILER_LAUNCHER=${deps_dir}/bin/ccache
    CMAKE_CXX_COMPILER_LAUNCHER=${deps_dir}/bin/ccache
    MIGRAPHX_ENABLE_CPU=On
    BUILD_DEV=On

[gh-win-cpu]
ignore =
    ROCm/composable_kernel
    ROCm/rocMLIR
    danmar/cppcheck
    pcre
    facebook/zstd
    ccache
deps =
    -f dev-requirements.txt
    oneapi-src/oneDNN@v1.7
define =
    MIGRAPHX_ENABLE_CPU=On
    MIGRAPHX_ENABLE_GPU=Off
    MIGRAPHX_ENABLE_FPGA=Off
    MIGRAPHX_ENABLE_PYTHON=Off
    BUILD_DEV=On

global_define =
    CMAKE_POLICY_DEFAULT_CMP0091=NEW
    CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL

[cibuild]
cxx = ${rocm_path}/llvm/bin/clang++
cc = ${rocm_path}/llvm/bin/clang
deps =
    -f dev-requirements.txt
define =
    CMAKE_C_COMPILER_LAUNCHER=${deps_dir}/bin/ccache
    CMAKE_CXX_COMPILER_LAUNCHER=${deps_dir}/bin/ccache
