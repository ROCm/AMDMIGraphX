name: PR Review Status (Issue)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python migraphx_pr_review_status.py --markdown > report.md

      - name: Update pinned issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Replace 1234 with your pinned issue number
          gh issue edit 1234 --repo ROCm/AMDMIGraphX --body-file report.md
