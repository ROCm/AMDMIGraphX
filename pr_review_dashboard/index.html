<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMDMIGraphX — PR Review Status</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --red: #f85149;
    --yellow: #d29922;
    --green: #3fb950;
    --blue: #58a6ff;
    --badge-red-bg: #3d1214;
    --badge-yellow-bg: #3d2e00;
    --badge-green-bg: #0e2a15;
    --purple: #a371f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  header h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
  header p  { color: var(--text-muted); font-size: 0.9rem; }

  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 0.6rem;
    margin-bottom: 2rem;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
    text-align: center;
  }
  .summary-card .count {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .summary-card .label {
    color: var(--text-muted);
    font-size: 0.75rem;
    margin-top: 0.15rem;
  }
  .summary-card.total    .count { color: var(--blue); }
  .summary-card.zero     .count { color: var(--red); }
  .summary-card.one      .count { color: var(--yellow); }
  .summary-card.two      .count { color: var(--purple); }
  .summary-card.approved .count { color: var(--green); }

  .bucket { margin-bottom: 2rem; }

  .table-scroll {
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .bucket-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    font-size: 1.15rem;
    font-weight: 600;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot.red    { background: var(--red); }
  .dot.yellow { background: var(--yellow); }
  .dot.green  { background: var(--green); }
  .dot.purple { background: var(--purple); }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    font-size: 0.9rem;
  }

  th {
    position: sticky;
    top: 0;
    z-index: 1;
    text-align: left;
    padding: 0.6rem 0.75rem;
    background: var(--bg);
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(136,198,255,0.04); }

  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .author-cell {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
  }

  .label-badge {
    display: inline-block;
    padding: 0.1rem 0.45rem;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 500;
    background: var(--border);
    color: var(--text-muted);
    margin-right: 0.25rem;
  }

  .reviewers { color: var(--text-muted); font-size: 0.85rem; }

  .empty-msg {
    padding: 1.5rem;
    text-align: center;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  #loading {
    text-align: center;
    padding: 4rem 0;
    color: var(--text-muted);
    font-size: 1.1rem;
  }

  #error {
    text-align: center;
    padding: 2rem;
    color: var(--red);
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>AMDMIGraphX — PR Review Status</h1>
  <p id="timestamp">Loading…</p>
</header>

<div id="loading">⏳ Loading report data…</div>
<div id="error"></div>
<div id="content" style="display:none;">
  <div class="summary" id="summary"></div>
  <div id="buckets"></div>
</div>

<script>
const BUCKET_META = [
  { key: 'zero',              dot: 'red',    title: 'Zero Member Reviews',          cardClass: 'zero'     },
  { key: 'one',               dot: 'yellow', title: 'One Member Review',            cardClass: 'one'      },
  { key: 'two_plus',          dot: 'purple', title: 'Two or More Member Reviews',   cardClass: 'two'      },
  { key: 'two_plus_approved', dot: 'green',  title: 'Two or More Member Approvals', cardClass: 'approved' },
];

function relativeTime(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins  < 60) return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  return `${days}d ago`;
}

function buildTable(prs) {
  if (!prs.length) return '<div class="empty-msg">No pull requests in this category 🎉</div>';

  let rows = prs.map(pr => {
    const labels = pr.labels.map(l => `<span class="label-badge">${l}</span>`).join(' ');
    const reviewers = pr.reviewers.length
      ? pr.reviewers.map(r => `<a href="https://github.com/${r}">@${r}</a>`).join(', ')
      : '—';
    return `<tr>
      <td><a href="${pr.url}">#${pr.number}</a></td>
      <td><div class="author-cell"><img class="avatar" src="${pr.author_avatar}&s=40" alt="">${pr.author}</div></td>
      <td>${pr.title} ${labels}</td>
      <td class="reviewers">${reviewers}</td>
      <td title="${pr.updated_at}">${relativeTime(pr.updated_at)}</td>
    </tr>`;
  }).join('');

  return `<div class="table-scroll"><table>
    <thead><tr><th>PR</th><th>Author</th><th>Title</th><th>Reviewers</th><th>Updated</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

async function init() {
  try {
    const resp = await fetch('data.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    // Timestamp
    const ts = new Date(data.generated_at);
    document.getElementById('timestamp').textContent =
      `Last updated: ${ts.toUTCString()}  •  ${data.total_prs} open non-draft PRs`;

    // Summary cards
    const summaryHTML = `
      <div class="summary-card total"><div class="count">${data.total_prs}</div><div class="label">Total PRs</div></div>
      <div class="summary-card zero"><div class="count">${data.counts.zero}</div><div class="label">Zero Reviews</div></div>
      <div class="summary-card one"><div class="count">${data.counts.one}</div><div class="label">One Review</div></div>
      <div class="summary-card two"><div class="count">${data.counts.two_plus}</div><div class="label">Two+ Reviews</div></div>
      <div class="summary-card approved"><div class="count">${data.counts.two_plus_approved}</div><div class="label">Two+ Approvals</div></div>
    `;
    document.getElementById('summary').innerHTML = summaryHTML;

    // Bucket tables
    let bucketsHTML = '';
    for (const { key, dot, title } of BUCKET_META) {
      bucketsHTML += `
        <div class="bucket">
          <div class="bucket-header"><span class="dot ${dot}"></span> ${title} (${data.buckets[key].length})</div>
          ${buildTable(data.buckets[key])}
        </div>`;
    }
    document.getElementById('buckets').innerHTML = bucketsHTML;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.textContent = `Failed to load data: ${err.message}`;
  }
}

init();
</script>

</body>
</html>
