name: windows

on:
  pull_request:
  push:
    branches:
      - develop
      - master
      - 'release/**'

jobs:
  windows-cpu:
    runs-on: windows-2025

    strategy:
      matrix:
        configuration:
          - Release

    env:
      CC: clang
      CXX: clang++

    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12

    - name: Setup cmake
      uses: jwlawson/actions-setup-cmake@v1.9
      with:
        cmake-version: 3.20.0

    - name: Install LLVM/Clang
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "20"
        directory: ${{ runner.temp }}/llvm

    - name: Install rbuild
      run: pip install https://github.com/RadeonOpenCompute/rbuild/archive/master.tar.gz

    - name: Cache dependencies
      continue-on-error: true
      uses: actions/cache@v4.2.0
      id: deps_cache
      with:
        path: ${{ github.workspace }}/cget
        key: windows-cget-clang-${{ hashFiles('requirements.txt', 'dev-requirements.txt', 'rbuild.ini') }}
        restore-keys: windows-cget-clang-

    - name: Install dependencies
      run: |
        rbuild prepare -d cget -s gh-win -G Ninja \
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL \
          -DBUILD_SHARED_LIBS=On \

    - name: Build and test
      env:
        CMAKE_PREFIX_PATH: ${{ github.workspace }}/cget
        CXXFLAGS: -DMIGRAPHX_USE_TYPE_ERASED_MATCHERS=1
      run: |
        rbuild build -d cget -s gh-win -G Ninja -T check \
          -DCMAKE_BUILD_TYPE=${{ matrix.configuration }} \
          -DMIGRAPHX_DISABLE_LARGE_BUFFER_TESTS=On \
          -DCTEST_TIMEOUT=5000
